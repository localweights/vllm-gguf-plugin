name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = project["project"]["version"]
          release_tag = os.environ["RELEASE_TAG"]
          normalized_tag = release_tag[1:] if release_tag.startswith("v") else release_tag

          if normalized_tag != version:
              raise SystemExit(
                  f"Release tag {release_tag!r} does not match pyproject version {version!r}."
              )

          print(f"Building sdist for version {version}")
          PY

      - name: Show package version
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(f"Building TestPyPI sdist for version {project['project']['version']}")
          PY

      - name: Install packaging tools
        run: python -m pip install --upgrade "setuptools>=77.0.3,<81.0.0" build twine

      - name: Build source distribution
        run: python -m build --sdist --no-isolation --skip-dependency-check

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  build-wheel:
    runs-on: ubuntu-latest

    # PyTorch's manylinux2_28 builder image: AlmaLinux 8 (glibc 2.28 floor)
    # with CUDA 13.0 + Python at /opt/python/cpXY-cpXY/ preinstalled. Same
    # base image vLLM publishes its x86_64 wheels from.
    container:
      image: pytorch/manylinux2_28-builder:cuda13.0

    permissions:
      contents: read

    env:
      PYTHON_VERSION: "3.12"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh \
            | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Create build venv
        run: |
          PYV_NODOT=${PYTHON_VERSION//./}
          uv venv /opt/build-venv \
            --python "/opt/python/cp${PYV_NODOT}-cp${PYV_NODOT}/bin/python${PYTHON_VERSION}"
          echo "/opt/build-venv/bin" >> "$GITHUB_PATH"

      - name: Install build dependencies
        run: |
          uv pip install "setuptools>=77.0.3,<81.0.0" wheel twine
          uv pip install --index-url https://download.pytorch.org/whl/cu130 \
            "torch>=2.9"

      - name: Build wheel
        run: ./scripts/build_release_wheel.sh

      - name: Retag wheel as manylinux_2_28_x86_64
        run: |
          cd dist
          python -m wheel tags --remove --platform-tag manylinux_2_28_x86_64 ./*.whl

      - name: Check wheel metadata
        run: python -m twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  publish-pypi:
    needs: [build-sdist, build-wheel]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-testpypi:
    needs: [build-sdist, build-wheel]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    environment:
      name: testpypi

    steps:
      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
